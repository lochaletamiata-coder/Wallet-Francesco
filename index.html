<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111111">
<title>Wallet · Francesco</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--surface:#1c1c1c;--surface2:#242424;--border:#2e2e2e;
  --text:#f0f0f0;--muted:#888;--faint:#444;
  --green:#b5b5b5;--red:#666;--white:#f0f0f0;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:3rem}

/* HEADER */
.header{padding:2.5rem 1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;gap:14px;margin-bottom:1.5rem}
.avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;filter:grayscale(100%);border:1px solid var(--border)}
.header-name{font-size:18px;font-weight:500;color:var(--text)}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}
.saldo-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.saldo-value{font-family:'DM Mono',monospace;font-size:48px;font-weight:300;color:var(--white);letter-spacing:-1px}
.saldo-value .cur{font-size:22px;color:var(--muted);margin-right:4px}

/* METRICS */
.metrics{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.metric{padding:1rem 1.25rem;border-right:1px solid var(--border)}
.metric:last-child{border-right:none}
.metric-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px}
.metric-value{font-family:'DM Mono',monospace;font-size:20px;font-weight:400;color:var(--text)}

/* MESI */
.mesi-bar{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.mesi-bar::-webkit-scrollbar{display:none}
.mese-btn{flex-shrink:0;padding:10px 16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:none;border-right:1px solid var(--border);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.mese-btn.active{color:var(--text);background:var(--surface2)}

/* SECTION */
.section{padding:1.25rem}
.section-title{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1rem}

/* CHART */
.chart-wrap{position:relative;height:160px;margin-bottom:0.5rem}
.chart-legend{display:flex;gap:16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.chart-legend span{display:flex;align-items:center;gap:5px}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block}

/* TIPO TOGGLE */
.tipo-toggle{display:flex;gap:0;margin-bottom:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tipo-btn{flex:1;padding:9px;border:none;background:none;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;color:var(--muted);transition:all 0.15s}
.tipo-btn.active-in{background:var(--surface2);color:var(--text)}
.tipo-btn.active-out{background:var(--surface2);color:var(--text)}

/* ADD BAR */
.add-bar{display:flex;gap:8px}
.add-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none}
.add-bar input::placeholder{color:var(--faint)}
.add-bar input:focus{border-color:var(--muted)}
.inp-amount{max-width:80px}
.btn-ok{width:42px;height:42px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0}
.btn-ok:active{background:var(--faint)}

/* TX LIST */
.tx-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tx-row{background:var(--surface);padding:12px 14px;display:flex;align-items:center;gap:12px}
.tx-type{font-family:'DM Mono',monospace;font-size:16px;color:var(--muted);width:20px;text-align:center;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-causale{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
.tx-amount{font-family:'DM Mono',monospace;font-size:14px;flex-shrink:0}
.tx-amount.in{color:#aaa}
.tx-amount.out{color:#666}
.btn-del{background:none;border:none;cursor:pointer;color:var(--faint);font-size:14px;padding:4px;transition:color 0.15s;flex-shrink:0}
.btn-del:hover{color:var(--muted)}

/* RESOCONTO */
.resoconto{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
.res-row:last-child{border-bottom:none}
.res-label{color:var(--muted);font-family:'DM Mono',monospace;font-size:11px}
.res-value{font-family:'DM Mono',monospace;font-size:13px;color:var(--text)}

.empty{text-align:center;color:var(--faint);font-family:'DM Mono',monospace;font-size:12px;padding:2rem;border:1px solid var(--border);border-radius:10px}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="header-top">
    <img id="avatar-img" class="avatar" src="" alt="Francesco" />
    <div>
      <div class="header-name">Francesco</div>
      <div class="header-sub">my wallet</div>
    </div>
  </div>
  <div class="saldo-label">saldo attuale</div>
  <div class="saldo-value"><span class="cur">€</span><span id="saldo-num">0,00</span></div>
</div>

<div class="metrics">
  <div class="metric">
    <div class="metric-label">entrate</div>
    <div class="metric-value" id="tot-in">€0</div>
  </div>
  <div class="metric">
    <div class="metric-label">uscite</div>
    <div class="metric-value" id="tot-out">€0</div>
  </div>
</div>

<div class="mesi-bar" id="mesi-bar"></div>

<div class="section">
  <div class="section-title">andamento</div>
  <div class="chart-wrap"><canvas id="myChart" role="img" aria-label="Grafico entrate uscite mensili"></canvas></div>
  <div class="chart-legend">
    <span><span class="ldot" style="background:#aaa"></span>entrate</span>
    <span><span class="ldot" style="background:#555"></span>uscite</span>
  </div>
</div>

<div class="section" style="padding-top:0">
  <div class="section-title">resoconto mese selezionato</div>
  <div class="resoconto" id="resoconto">
    <div class="res-row"><span class="res-label">entrate</span><span class="res-value" id="res-in">€0,00</span></div>
    <div class="res-row"><span class="res-label">uscite</span><span class="res-value" id="res-out">€0,00</span></div>
    <div class="res-row"><span class="res-label">saldo mese</span><span class="res-value" id="res-saldo">€0,00</span></div>
    <div class="res-row"><span class="res-label">movimenti</span><span class="res-value" id="res-count">0</span></div>
  </div>
</div>

<div class="section" style="padding-top:0">
  <div class="section-title">nuovo movimento</div>
  <div class="tipo-toggle">
    <button class="tipo-btn active-in" id="btn-in" onclick="setTipo('in')">↑ entrata</button>
    <button class="tipo-btn" id="btn-out" onclick="setTipo('out')">↓ uscita</button>
  </div>
  <div class="add-bar">
    <input type="text" id="inp-causale" placeholder="causale" autocomplete="off"/>
    <input type="number" id="inp-amount" class="inp-amount" placeholder="€" min="0" step="0.01"/>
    <button class="btn-ok" id="btn-ok" onclick="aggiungi()">+</button>
  </div>
</div>

<div class="section" style="padding-top:0">
  <div class="section-title">movimenti — <span id="mese-label-tx"></span></div>
  <div id="tx-list"><div class="empty">nessun movimento</div></div>
</div>

</div>

<script>
let tipo='in';
let txs=JSON.parse(localStorage.getItem('wallet_fran_v2')||'[]');
let chart;
let meseAttivo=null;

function getMeseKey(date){
  const d=new Date(date);
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
}
function getMeseLabel(key){
  const [y,m]=key.split('-');
  const d=new Date(y,parseInt(m)-1,1);
  return d.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
}
function fmt(n){return'€'+Math.abs(n).toFixed(2).replace('.',',')}

function setTipo(t){
  tipo=t;
  document.getElementById('btn-in').className=t==='in'?'tipo-btn active-in':'tipo-btn';
  document.getElementById('btn-out').className=t==='out'?'tipo-btn active-out':'tipo-btn';
  document.getElementById('btn-ok').textContent=t==='in'?'+':'−';
}

function aggiungi(){
  const causale=document.getElementById('inp-causale').value.trim();
  const amount=parseFloat(document.getElementById('inp-amount').value);
  if(!causale||isNaN(amount)||amount<=0)return;
  txs.unshift({id:Date.now(),tipo,causale,amount:Math.round(amount*100)/100,date:new Date().toISOString()});
  localStorage.setItem('wallet_fran_v2',JSON.stringify(txs));
  document.getElementById('inp-causale').value='';
  document.getElementById('inp-amount').value='';
  render();
}

function elimina(id){
  txs=txs.filter(t=>t.id!==id);
  localStorage.setItem('wallet_fran_v2',JSON.stringify(txs));
  render();
}

function render(){
  const totIn=txs.filter(t=>t.tipo==='in').reduce((s,t)=>s+t.amount,0);
  const totOut=txs.filter(t=>t.tipo==='out').reduce((s,t)=>s+t.amount,0);
  const saldo=totIn-totOut;
  document.getElementById('saldo-num').textContent=fmt(saldo).replace('€','');
  document.getElementById('tot-in').textContent=fmt(totIn);
  document.getElementById('tot-out').textContent=fmt(totOut);

  // mesi unici
  const mesiSet=[...new Set(txs.map(t=>getMeseKey(t.date)))].sort().reverse();
  if(!meseAttivo||!mesiSet.includes(meseAttivo)) meseAttivo=mesiSet[0]||null;

  const bar=document.getElementById('mesi-bar');
  bar.innerHTML='';
  if(mesiSet.length===0){
    const b=document.createElement('button');
    b.className='mese-btn active';
    b.textContent='tutti';
    bar.appendChild(b);
  } else {
    mesiSet.forEach(k=>{
      const b=document.createElement('button');
      b.className='mese-btn'+(k===meseAttivo?' active':'');
      b.textContent=new Date(k+'-01').toLocaleDateString('it-IT',{month:'short',year:'2-digit'});
      b.onclick=()=>{meseAttivo=k;render();};
      bar.appendChild(b);
    });
  }

  // tx filtrate per mese
  const txMese=meseAttivo?txs.filter(t=>getMeseKey(t.date)===meseAttivo):txs;
  const mIn=txMese.filter(t=>t.tipo==='in').reduce((s,t)=>s+t.amount,0);
  const mOut=txMese.filter(t=>t.tipo==='out').reduce((s,t)=>s+t.amount,0);
  document.getElementById('res-in').textContent=fmt(mIn);
  document.getElementById('res-out').textContent=fmt(mOut);
  document.getElementById('res-saldo').textContent=fmt(mIn-mOut);
  document.getElementById('res-count').textContent=txMese.length;
  document.getElementById('mese-label-tx').textContent=meseAttivo?getMeseLabel(meseAttivo):'tutti';

  const list=document.getElementById('tx-list');
  if(txMese.length===0){
    list.innerHTML='<div class="empty">nessun movimento</div>';
  } else {
    list.innerHTML='<div class="tx-list">'+txMese.map(t=>{
      const ds=new Date(t.date).toLocaleDateString('it-IT',{day:'2-digit',month:'short'});
      return`<div class="tx-row">
        <div class="tx-type">${t.tipo==='in'?'↑':'↓'}</div>
        <div class="tx-info">
          <div class="tx-causale">${t.causale}</div>
          <div class="tx-date">${ds}</div>
        </div>
        <div class="tx-amount ${t.tipo}">${t.tipo==='in'?'+':'−'}${fmt(t.amount)}</div>
        <button class="btn-del" onclick="elimina(${t.id})">✕</button>
      </div>`;
    }).join('')+'</div>';
  }

  updateChart(txs);
}

function updateChart(txs){
  const monthMap={};
  txs.forEach(t=>{
    const lbl=getMeseKey(t.date);
    if(!monthMap[lbl])monthMap[lbl]={in:0,out:0};
    monthMap[lbl][t.tipo]+=t.amount;
  });
  const labels=Object.keys(monthMap).sort();
  const lblShort=labels.map(k=>new Date(k+'-01').toLocaleDateString('it-IT',{month:'short'}));
  const dataIn=labels.map(l=>Math.round(monthMap[l].in*100)/100);
  const dataOut=labels.map(l=>Math.round(monthMap[l].out*100)/100);
  if(!chart){
    chart=new Chart(document.getElementById('myChart'),{
      type:'bar',
      data:{
        labels:lblShort.length?lblShort:['—'],
        datasets:[
          {label:'Entrate',data:dataIn.length?dataIn:[0],backgroundColor:'#888',borderRadius:4},
          {label:'Uscite',data:dataOut.length?dataOut:[0],backgroundColor:'#444',borderRadius:4}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{ticks:{color:'#666',font:{size:10,family:'DM Mono'}},grid:{display:false},border:{display:false}},
          y:{ticks:{color:'#666',font:{size:10,family:'DM Mono'},callback:v=>'€'+v},grid:{color:'rgba(255,255,255,0.05)'},border:{display:false}}
        }
      }
    });
  } else {
    chart.data.labels=lblShort.length?lblShort:['—'];
    chart.data.datasets[0].data=dataIn.length?dataIn:[0];
    chart.data.datasets[1].data=dataOut.length?dataOut:[0];
    chart.update();
  }
}

document.getElementById('inp-causale').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('inp-amount').focus()});
document.getElementById('inp-amount').addEventListener('keydown',e=>{if(e.key==='Enter')aggiungi()});

render();
</script>
</body>
</html>
